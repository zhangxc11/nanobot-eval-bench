id: "task-002"
name: "Token 用量统计系统"
category: "code_modification"
difficulty: "hard"
type: "code_modification"
tags: ["nanobot-core", "analytics", "sqlite", "agent-loop"]

description: |
  给 nanobot 添加 token 用量统计功能：
  1. 后端：创建 usage/ 模块，使用 SQLite 记录每次 LLM 调用的 token 用量
  2. 后端：在 agent/loop.py 的 LLM 调用返回后集成统计逻辑
  3. 提供查询接口：按时间范围、按 session、按 model 汇总
  要求在现有 nanobot 代码基础上进行修改，不破坏现有功能。

  项目代码位于 ~/.nanobot/workspace/project/nanobot/，
  这是一个有 git 历史的仓库，agent 可以查看 git log、diff 等。

source_sessions:
  - "cli_webchat_1772111064"

# ─── initial_state 目录映射 ─────────────────────────────
# key: initial_state/ 下的子目录名
# value: 容器内相对于 EVAL_HOME (/eval) 的目标路径
initial_state_mapping:
  # nanobot 源码（8bc8589 快照，不含 usage/ 模块）
  # 这是一个完整的 git 仓库，agent 可以 git log/diff
  project_code: ".nanobot/workspace/project/nanobot"
  # 预置的 skill（dev-workflow 等）
  skills: ".nanobot/workspace/skills"
  # 预置的 memory（包含项目上下文）
  memory: ".nanobot/workspace/memory"

# 结果快照目录
snapshot_dirs:
  - ".nanobot/workspace/project/nanobot"

# 验证脚本（pytest）
verify_script: "verify/test_analytics.py"

# 多轮对话
multi_turn: true
interaction_count: 3

# 评测维度
eval_dimensions:
  - name: "功能完整性"
    weight: 0.35
    description: |
      - usage 模块是否正确实现 SQLite 记录
      - 是否在 loop.py 中正确集成
      - 是否提供查询接口（按时间/session/model）
      - 数据库 schema 是否合理

  - name: "代码质量"
    weight: 0.25
    description: |
      - 修改是否最小化（不破坏无关代码）
      - 错误处理是否完善（DB 不存在、并发写入）
      - SQL 注入防护
      - 类型注解

  - name: "兼容性"
    weight: 0.20
    description: |
      - loop.py 核心函数是否保持完整
      - 是否正确处理了 DB 不存在的情况（自动创建）
      - 是否使用相对路径或配置路径（不硬编码）

  - name: "效率"
    weight: 0.10
    description: |
      - 工具调用次数
      - 是否有不必要的重复

  - name: "开发规范"
    weight: 0.10
    description: |
      - 是否遵循 dev-workflow（文档先行）
      - 是否有 git commit
      - 是否更新了 DEVLOG

# 硬性成功标准（内置规则验证）
success_criteria:
  - ".nanobot/workspace/project/nanobot/nanobot/usage/recorder.py 存在"
  - ".nanobot/workspace/project/nanobot/nanobot/agent/loop.py 包含 usage"

# 环境要求
environment:
  python: "3.11"
  os: "linux"
  tools_available:
    - exec
    - read_file
    - write_file
    - edit_file
    - list_dir
    - web_search
    - web_fetch
  pre_installed_packages:
    - pytest
    - pytest-asyncio
  mock_services: []

# 资源限制
limits:
  timeout_minutes: 45
  max_tool_calls: 200
  max_llm_calls: 80
  max_prompt_tokens: 2000000
