id: "task-001"
name: "创建豆包联网搜索 Skill"
category: "skill_development"
difficulty: "medium"
tags: ["skill", "api-integration", "testing", "dev-workflow"]

description: |
  从零创建一个基于豆包 2.0 Pro (Responses API + web_search 工具) 的联网搜索 skill。
  要求遵循 dev-workflow 规范（文档先行、任务拆解、测试验证），
  最终产出可用的 skill 目录，包含 SKILL.md、脚本、文档和测试。

source_sessions:
  - "webchat_1772349033"

# 多轮对话（模拟用户交互）
multi_turn: true
interaction_count: 4  # 用户会介入 3-4 次（提供 API Key、endpoint ID、参考代码）

# 评测维度与权重
eval_dimensions:
  - name: "功能完整性"
    weight: 0.30
    description: |
      skill 是否实现了三个核心命令：
      1. search — 纯搜索，返回 [{title, url, snippet}]
      2. search-and-summarize — 搜索+总结
      3. fetch-url — URL 内容解析总结
      脚本是否可执行，是否能正确调用 API

  - name: "代码质量"
    weight: 0.20
    description: |
      - 代码结构清晰（类封装、函数分离）
      - 错误处理完善（API 错误、网络超时、配置缺失）
      - 日志输出到 stderr，JSON 结果输出到 stdout
      - 无硬编码敏感信息

  - name: "开发规范遵循"
    weight: 0.20
    description: |
      是否遵循 dev-workflow skill 规范：
      - 有 docs/REQUIREMENTS.md
      - 有 docs/ARCHITECTURE.md
      - 有 docs/DEVLOG.md
      - SKILL.md 格式正确（YAML frontmatter + 使用说明）
      - 目录结构规范（scripts/, docs/, tests/）

  - name: "效率"
    weight: 0.15
    description: |
      - 工具调用次数是否合理（参考值 ~60 次）
      - 是否有不必要的重复读写
      - 是否能快速定位问题（如 API 参数格式）

  - name: "鲁棒性与测试"
    weight: 0.15
    description: |
      - 是否有测试代码
      - 是否处理了 JSON 解析失败的情况
      - 是否处理了 markdown code block 包裹的 JSON

# 成功标准（硬性）
success_criteria:
  - "skills/doubao-search/SKILL.md 存在且包含 YAML frontmatter"
  - "skills/doubao-search/scripts/doubao_search.py 存在且可执行"
  - "doubao_search.py 支持 search / search-and-summarize / fetch-url 三个子命令"
  - "doubao_search.py 从 config.json 读取凭证，不硬编码 API Key"
  - "调用 mock API 时三个命令均返回有效 JSON"
  - "skills/doubao-search/docs/ 目录下有 REQUIREMENTS.md"

# 环境要求
environment:
  python: "3.11"
  os: "linux"  # Docker 中运行
  tools_available:
    - exec
    - read_file
    - write_file
    - edit_file
    - list_dir
    - web_search
    - web_fetch
  pre_installed_packages:
    - pytest
  mock_services:
    - name: "volcengine_responses_api"
      type: "http_mock"
      port: 18080
      provider_name: "mock-volcengine"
      description: "模拟火山方舟 Responses API，返回预设的搜索结果"
      config: "mocks/volcengine_mock.py"

# 资源限制
limits:
  timeout_minutes: 30
  max_tool_calls: 150
  max_llm_calls: 50
  max_prompt_tokens: 1000000
