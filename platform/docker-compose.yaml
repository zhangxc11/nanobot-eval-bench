services:
  # Mock API 服务 — 给 agent 创建的 skill 脚本调用（模拟豆包 API 等）
  mock-api:
    image: eval-bench-mock:latest
    volumes:
      - ../tasks/${TASK_ID:-task-001-doubao-search-skill}/mocks:/mocks:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18080/health')"]
      interval: 3s
      timeout: 2s
      retries: 5

  # Agent 执行环境 — nanobot 源码已 COPY 到镜像中
  agent-runner:
    image: eval-bench-agent:latest
    depends_on:
      mock-api:
        condition: service_healthy
    volumes:
      # 任务定义（只读）
      - ../tasks/${TASK_ID:-task-001-doubao-search-skill}:/eval/task:ro
      # 结果输出
      - ../results/${RUN_ID:-latest}:/eval/results
    environment:
      - AGENT_API_KEY=${AGENT_API_KEY}
      - AGENT_PROVIDER=${AGENT_PROVIDER:-anthropic}
      - AGENT_MODEL=${AGENT_MODEL:-claude-sonnet-4-20250514}
      - AGENT_API_BASE=${AGENT_API_BASE:-}
      - MOCK_API_URL=http://mock-api:18080
      - MAX_TOOL_CALLS=${MAX_TOOL_CALLS:-150}
      - TIMEOUT_MINUTES=${TIMEOUT_MINUTES:-30}
      - TASK_DIR=/eval/task
      - RESULTS_DIR=/eval/results
      - HOME=/eval
